<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Polarium Dashboard</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#eef2f7}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#3D5A7A;background:#eef2f7;z-index:9}
  .spin{width:40px;height:40px;border:4px solid #C3D4E6;border-top-color:#0891B2;border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 16px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{color:#C0392B;margin-top:12px;font-size:14px;max-width:600px;text-align:center;padding:0 16px}
  #dashFrame{position:fixed;inset:0;width:100%;height:100%;border:0;display:none}
</style>
</head>
<body>
<div id="loading">
  <div class="spin"></div>
  <div>Đang tải Dashboard...</div>
  <div id="errBox" class="err"></div>
</div>
<iframe id="dashFrame"></iframe>
<script>
const BASE='https://moustache-oink-pregnant.ngrok-free.dev';
fetch(BASE+'/dashboard.html?t='+Date.now(), {headers:{'ngrok-skip-browser-warning':'1'}})
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
  .then(html=>{
    const frame = document.getElementById('dashFrame');
    frame.srcdoc = html;
    frame.onload = function(){
      document.getElementById('loading').style.display='none';
      frame.style.display='block';
    };
  })
  .catch(err=>{
    document.getElementById('errBox').textContent =
      'Không tải được Dashboard — có thể server đang tắt. Chi tiết: ' + err.message;
  });
</script>
</body>
</html>
