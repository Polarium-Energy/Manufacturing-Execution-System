<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đang mở Dashboard...</title>
<style>
  body{font-family:Arial,sans-serif;background:#eef2f7;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
  .box{text-align:center;color:#3D5A7A}
  .spin{width:40px;height:40px;border:4px solid #C3D4E6;border-top-color:#0891B2;border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 16px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{color:#C0392B;margin-top:12px;font-size:14px}
</style>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <div>Đang tải Dashboard...</div>
  <div id="errBox" class="err"></div>
</div>
<script>
const BASE='https://moustache-oink-pregnant.ngrok-free.dev';
fetch(BASE+'/dashboard.html?t='+Date.now(), {headers:{'ngrok-skip-browser-warning':'1'}})
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
  .then(html=>{
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    window.location.replace(url);
  })
  .catch(err=>{
    document.getElementById('errBox').textContent =
      'Không tải được Dashboard — có thể server đang tắt. Chi tiết: ' + err.message;
  });
</script>
</body>
</html>
